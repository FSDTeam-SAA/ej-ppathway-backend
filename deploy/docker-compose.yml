# Self-hosted EJ Pathway stack (backend + calls + video + recording) for one VPS.
#
# Services:
#   redis    - coordination bus between LiveKit and Egress (localhost only)
#   livekit  - the SFU media server (handles all audio/video routing + ICE/TURN)
#   egress   - records room composites into the shared `recordings` volume
#   backend  - this Express API (fresh deploy, isolated from anything else on the box)
#
# IMPORTANT: livekit/egress/redis use host networking. LiveKit needs a large UDP port
# range (50000-60000); publishing that as a Docker port range spawns ~10k proxy
# processes and hangs container start, so host networking is the recommended approach.
#
# Steps:
#   1. Put your real values in ../.env  and in livekit.yaml + egress.yaml (same key/secret).
#   2. Open firewall: 7880/tcp, 7881/tcp, 50000-60000/udp.
#   3. docker compose up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    # Bind to localhost only — livekit/egress reach it at 127.0.0.1:6379.
    command: redis-server --bind 127.0.0.1 --port 6379 --save 20 1 --loglevel warning

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    network_mode: host          # uses 7880/7881 + UDP 50000-60000 directly on the host
    command: --config /etc/livekit.yaml
    depends_on: [redis]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    network_mode: host
    depends_on: [redis, livekit]
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - recordings:/recordings  # shared with backend; matches EGRESS_OUTPUT_DIR=/recordings
    shm_size: "1gb"             # headless Chromium needs a larger /dev/shm

  backend:
    build: ..                   # builds Ej-backend/Dockerfile
    restart: unless-stopped
    depends_on: [redis, livekit]
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 5001
      EGRESS_OUTPUT_DIR: /recordings
    ports:
      - "5055:5001"             # host 5055 (free) -> container 5001; nginx proxies to 5055
    volumes:
      - recordings:/recordings  # same volume egress writes to (for R2 upload fallback)

volumes:
  recordings:
