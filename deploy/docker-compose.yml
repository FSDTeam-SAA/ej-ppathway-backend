# Self-hosted EJ Pathway stack (backend + calls + video + recording) for one VPS.
#
# Services:
#   redis    - coordination bus between LiveKit and Egress
#   livekit  - the SFU media server (handles all audio/video routing + ICE/TURN)
#   egress   - records room composites into the shared `recordings` volume
#   backend  - this Express API (fresh deploy, isolated from anything else on the box)
#
# The backend reads finished recordings from the shared `recordings` volume and
# uploads them to Cloudinary (default), or set EGRESS_S3_* to upload to S3 directly.
#
# Steps:
#   1. Put your real values in ../.env  and in livekit.yaml + egress.yaml (same key/secret).
#   2. Open firewall: 7880/tcp, 7881/tcp, 50000-60000/udp. (Backend + LiveKit ws sit behind nginx TLS.)
#   3. docker compose up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    networks: [lk]

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    depends_on: [redis]
    ports:
      - "7880:7880"                    # signaling (ws/http) — fronted by nginx TLS
      - "7881:7881"                    # RTC over TCP fallback
      - "50000-60000:50000-60000/udp"  # RTC media (UDP)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    networks: [lk]

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    depends_on: [redis, livekit]
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - recordings:/recordings         # shared with backend; matches EGRESS_OUTPUT_DIR=/recordings
    shm_size: "1gb"                     # headless Chromium needs a larger /dev/shm
    networks: [lk]

  backend:
    build: ..                          # builds Ej-backend/Dockerfile
    restart: unless-stopped
    depends_on: [redis, livekit]
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 5001
      EGRESS_OUTPUT_DIR: /recordings
    ports:
      - "5055:5001"                    # host 5055 (free) -> container 5001; nginx proxies to 5055
    volumes:
      - recordings:/recordings         # same volume egress writes to (for Cloudinary upload)
    networks: [lk]

volumes:
  recordings:

networks:
  lk:
    driver: bridge
